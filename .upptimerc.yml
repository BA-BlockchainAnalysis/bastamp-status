owner: BA-BlockchainAnalysis
repo: bastamp-status

sites:
  - name: BA Stamp Website
    url: https://bastamp.com
    expectedStatusCodes:
      - 200

  - name: BA Stamp App
    url: https://bastamp.com/docs/api
    expectedStatusCodes:
      - 200

  - name: Polygon RPC (publicnode)
    url: https://polygon-bor-rpc.publicnode.com
    method: POST
    body: '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
    headers:
      - "Content-Type: application/json"
    expectedStatusCodes:
      - 200

  - name: OpenTimestamps Calendar
    url: https://alice.btc.calendar.opentimestamps.org
    expectedStatusCodes:
      - 200

status-website:
  cname: status.bastamp.com
  logoUrl: https://bastamp.com/ba-symbol.svg
  name: BA | Stamp Status
  introTitle: "**BA | Stamp** Status"
  introMessage: Real-time status and uptime for [bastamp.com](https://bastamp.com) and the services it depends on — the app, the Polygon anchoring RPC, and the OpenTimestamps Bitcoin calendar. Powered by [Upptime](https://upptime.js.org) — no server, just GitHub Actions.
  navbar:
    - title: Status
      href: /
    - title: Website
      href: https://bastamp.com
    - title: Docs
      href: https://bastamp.com/docs/api
